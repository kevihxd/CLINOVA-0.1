spring.application.name=clinova

# Configuración de la Base de Datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/clinova_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA e Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuración para subida de archivos (Fotos y PDFs)
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=50MB

# Configuración Gemini API
gemini.api.key=
gemini.api.url=gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent
